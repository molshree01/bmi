<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced BMI App</title>
    <style>
        /* UI Enhancements */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1cb5e0 0%, #000046 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #000046;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #1cb5e0;
            box-shadow: 0 0 5px rgba(28, 181, 224, 0.3);
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #1cb5e0, #000046);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }

        #result {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            padding: 10px;
            border-radius: 8px;
        }

        label {
            font-size: 13px;
            color: #666;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="card" id="loginCard">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Enter Email" required>
            <input type="password" id="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="card hidden" id="bmiCard">
        <h2>BMI Calculator</h2>
        <form id="bmiForm">
            <input type="text" id="name" placeholder="Name" required>
            
            <div style="margin-top: 5px;">
                <label for="dob">Date of Birth</label>
                <div class="row">
                    <input type="date" id="dob" required onchange="calculateAge()">
                    <input type="number" id="age" placeholder="Age" readonly required style="background: #e9ecef;">
                </div>
            </div>

            <input type="number" step="0.1" id="weight" placeholder="Weight (kg)" required>

            <div class="row">
                <select id="heightUnit" onchange="toggleHeight()" style="width: 40%;">
                    <option value="cm">cm</option>
                    <option value="ft">ft / in</option>
                </select>
                
                <div id="cmWrapper" style="width: 60%;">
                    <input type="number" step="0.1" id="heightCM" placeholder="Height (cm)" required>
                </div>
                
                <div id="ftWrapper" class="row hidden" style="width: 60%;">
                    <input type="number" id="ft" placeholder="ft">
                    <input type="number" id="in" placeholder="in">
                </div>
            </div>

            <button type="submit">Calculate</button>
        </form>

        <div id="result"></div>
    </div>

<script>
    // --- 1. Login Handling ---
    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevents page reload
        // Since the 'required' attributes are met if this triggers, we just switch screens
        document.getElementById("loginCard").classList.add("hidden");
        document.getElementById("bmiCard").classList.remove("hidden");
    });

    // --- 2. Calculate Age from DOB ---
    function calculateAge() {
        const dobValue = document.getElementById("dob").value;
        if (!dobValue) return;

        const dob = new Date(dobValue);
        const diff_ms = Date.now() - dob.getTime();
        const age_dt = new Date(diff_ms); 
        
        const age = Math.abs(age_dt.getUTCFullYear() - 1970);
        document.getElementById("age").value = age;
    }

    // --- 3. Toggle Height Units & Mandate Active Inputs ---
    function toggleHeight() {
        const unit = document.getElementById("heightUnit").value;
        const cmWrapper = document.getElementById("cmWrapper");
        const ftWrapper = document.getElementById("ftWrapper");
        
        const heightCM = document.getElementById("heightCM");
        const ftInput = document.getElementById("ft");
        const inInput = document.getElementById("in");

        if (unit === "cm") {
            cmWrapper.classList.remove("hidden");
            ftWrapper.classList.add("hidden");
            // Mandate CM, un-mandate FT/IN
            heightCM.required = true;
            ftInput.required = false;
            inInput.required = false;
        } else {
            cmWrapper.classList.add("hidden");
            ftWrapper.classList.remove("hidden");
            // Mandate FT/IN, un-mandate CM
            heightCM.required = false;
            ftInput.required = true;
            inInput.required = true;
        }
    }

    // --- 4. BMI Calculation Handling ---
    document.getElementById("bmiForm").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevents page reload

        let name = document.getElementById("name").value;
        let age = document.getElementById("age").value;
        let weight = parseFloat(document.getElementById("weight").value);
        let unit = document.getElementById("heightUnit").value;
        
        let heightInMeters = 0;

        // Convert based on selected unit
        if (unit === "cm") {
            let cm = parseFloat(document.getElementById("heightCM").value);
            heightInMeters = cm / 100;
        } else {
            let ft = parseFloat(document.getElementById("ft").value) || 0;
            let inches = parseFloat(document.getElementById("in").value) || 0;
            heightInMeters = ((ft * 12) + inches) * 0.0254; // Convert inches to meters
        }

        if (heightInMeters > 0 && weight > 0) {
            let bmi = (weight / (heightInMeters * heightInMeters)).toFixed(2);
            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Underweight";
                color = "#f39c12"; // Orange
            } else if (bmi < 25) {
                category = "Normal";
                color = "#27ae60"; // Green
            } else {
                category = "Overweight";
                color = "#e74c3c"; // Red
            }

            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `<strong>${name}</strong> (Age ${age})<br>BMI: <strong>${bmi}</strong><br>Category: <span style="color:${color}; font-weight:bold;">${category}</span>`;
            resultDiv.style.backgroundColor = "#f8f9fa";
            resultDiv.style.border = `2px solid ${color}`;
        }
    });
</script>

</body>
</html>
